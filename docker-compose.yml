# docker compose up  ->  http://localhost:8787
# change the host port:  OPENPROP_PORT=9000 docker compose up   (or set it in .env)
services:
  openprop:
    build: .
    ports:
      - "${OPENPROP_PORT:-8787}:8000"   # host -> container (container stays on 8000)
    env_file: .env          # your keys + OPENPROP_PASSWORD
    volumes:
      - openprop-data:/app/data   # persists the SQLite cache/notes across restarts
    restart: unless-stopped

volumes:
  openprop-data:
